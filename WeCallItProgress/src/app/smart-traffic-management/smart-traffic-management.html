<div class="traffic-page">
  <div class="header">
    <h2>🚦 Smart Traffic Management</h2>
    <p>SDG 9: Industry, Innovation & Infrastructure | Live API Integration</p>
  </div>

  <div class="container">
    <!-- Map Section -->
    <div class="map-section">
      <div #mapContainer class="map-container"></div>
    </div>

    <!-- Controls Section -->
    <div class="controls-section">
      <div class="card">
        <h3>➕ Add Route</h3>
        
        <div *ngIf="errorMessage" class="error-message">
          ⚠️ {{ errorMessage }}
        </div>
        
        <input 
          type="text" 
          placeholder="Route name (e.g., EDSA, C5, Commonwealth)" 
          [(ngModel)]="newRoute.name"
        >

        <select [(ngModel)]="newRoute.status">
          <option value="normal">🟢 Normal</option>
          <option value="heavy">🟠 Heavy</option>
          <option value="blocked">🔴 Blocked</option>
        </select>

        <select [(ngModel)]="newRoute.congestionLevel">
          <option value="20">🟢 20% - Light traffic</option>
          <option value="50">🟠 50% - Moderate</option>
          <option value="80">🔴 80% - Heavy</option>
          <option value="95">🔴 95% - Gridlock</option>
        </select>

        <button (click)="addRoute()" [disabled]="loading">
          {{ loading ? 'Adding...' : '➕ Add Route' }}
        </button>
      </div>

      <div class="card">
        <h3>📋 Routes List 
          <span *ngIf="loading" class="loading-spinner">⏳</span>
        </h3>
        
        <div class="route-list">
          <div *ngFor="let route of routes" class="route-item">
            <div class="route-info">
              <strong>{{ route.name }}</strong>
              <span class="badge" [class]="route.status">
                {{ route.status }}
              </span>
              <small>🚗 {{ route.congestionLevel }}% congestion</small>
              <div class="quick-update">
                <button class="update-btn" (click)="updateCongestion(route, 20)">20%</button>
                <button class="update-btn" (click)="updateCongestion(route, 50)">50%</button>
                <button class="update-btn" (click)="updateCongestion(route, 80)">80%</button>
              </div>
            </div>
            <button class="delete-btn" (click)="deleteRoute(route.id)">
              Delete
            </button>
          </div>
          
          <div *ngIf="routes.length === 0 && !loading" class="empty">
            No routes yet. Add your first route!
          </div>
          
          <div *ngIf="routes.length === 0 && loading" class="empty">
            Loading routes from API...
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
